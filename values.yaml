# Default values for api-gateway subchart.
# These are the same dex: and oauth2-proxy: sections that previously lived at
# the top level of the umbrella chart's values.yaml.

# ── MCP endpoints ────────────────────────────────────────────────────────────
# List of MCP servers the api-gateway should expose.  Each entry generates:
#   - an authenticated /mcp ingress at <subdomain>.<global.baseDomain>
#   - a /.well-known ingress at the same host (no auth)
#
# Fields per entry:
#   subdomain  public hostname prefix  (e.g. "calendar" → calendar.<baseDomain>)
#   service    K8s service name suffix (e.g. "mcp-calendar" → <release>-mcp-calendar)
#
# Override this list in the umbrella chart's api-gateway: block.
mcpEndpoints: []
# - subdomain: calendar
#   service: mcp-calendar


# ── Dex (OAuth 2.1 authorization server) ─────────────────────────────────────
dex:
  config:
    # When changing domain: update issuer and connectors[0].config.redirectURI
    # to match global.authServerUrl (https://auth.<baseDomain>)
    issuer: https://auth.mcp.jakobjkolb.xyz
    storage:
      type: kubernetes
      config:
        inCluster: true
    web:
      http: 0.0.0.0:5556
    connectors:
      - type: github
        id: github
        name: GitHub
        config:
          clientID: $GITHUB_CLIENT_ID
          clientSecret: $GITHUB_CLIENT_SECRET
          redirectURI: https://auth.mcp.jakobjkolb.xyz/callback
    oauth2:
      skipApprovalScreen: true
    staticClients:
      - id: claude-mcp
        name: Claude MCP
        secretEnv: DEX_CLIENT_SECRET
        redirectURIs:
          - https://claude.ai/api/mcp/auth_callback
  envFrom:
    - secretRef:
        name: dex-github-client   # secrets-bootstrap.sh (ArgoCD) or templates/secrets.yaml
    - secretRef:
        name: dex-static-client   # secrets-bootstrap.sh (ArgoCD) or templates/secrets.yaml

  ingress:
    enabled: false    # api-gateway subchart owns all ingresses
  serviceAccount:
    create: true
  rbac:
    create: true


# ── oauth2-proxy (internal Bearer JWT validator) ──────────────────────────────
oauth2-proxy:
  extraArgs:
    provider: oidc
    # When changing domain: update oidc-issuer-url to match global.authServerUrl (https://auth.<baseDomain>)
    oidc-issuer-url: https://auth.mcp.jakobjkolb.xyz
    upstream: file:///dev/null      # external-auth mode only — no reverse proxying
    email-domain: "*"
    skip-jwt-bearer-tokens: "true"  # validate Bearer JWTs directly (no session cookie)
    skip-provider-button: "true"
    http-address: 0.0.0.0:4180
  config:
    existingSecret: oauth2-proxy      # created by secrets-bootstrap.sh (ArgoCD) or templates/secrets.yaml
  service:
    type: ClusterIP
    portNumber: 4180
  ingress:
    enabled: false    # internal only — nginx reaches it via cluster DNS
