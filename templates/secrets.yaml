{{- if .Values.global.createSecrets }}
{{- $s := .Values.global.secrets -}}
---
apiVersion: v1
kind: Secret
metadata:
  name: dex-github-client
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
type: Opaque
stringData:
  GITHUB_CLIENT_ID: {{ required "global.secrets.githubClientId is required" $s.githubClientId | quote }}
  GITHUB_CLIENT_SECRET: {{ required "global.secrets.githubClientSecret is required" $s.githubClientSecret | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: dex-static-client
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
type: Opaque
stringData:
  DEX_CLIENT_SECRET: {{ required "global.secrets.dexClientSecret is required" $s.dexClientSecret | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: oauth2-proxy
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
type: Opaque
stringData:
  client-id: "claude-mcp"
  client-secret: {{ required "global.secrets.dexClientSecret is required" $s.dexClientSecret | quote }}
  cookie-secret: {{ required "global.secrets.cookieSecret is required" $s.cookieSecret | quote }}
{{- end }}
